name: Static Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: "🚀 Static Deploy — Nexo Digital v1"
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Transferencia Segura (SCP - SecOps)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "./*"
          # Ruta exacta solicitada en Hostinger
          target: "/home/u526996563/domains/chatopsmaster.com/public_html/nexo"
          strip_components: 0
          timeout: 60s # Aumentamos el margen para redes lentas

      - name: 3. 🔔 Notificación a Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            COLOR="5763719"
            TITLE="🚀 **¡Despliegue Exitoso!**"
          else
            COLOR="15548997"
            TITLE="❌ **Error en el Despliegue**"
          fi
          
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -n 1 | sed 's/"/\\"/g')
          
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{
                 \"content\": \"$TITLE\",
                 \"embeds\": [{
                   \"title\": \"ChatOpsMaster Update\",
                   \"color\": $COLOR,
                   \"fields\": [
                     { \"name\": \"📝 Mensaje\", \"value\": \"$COMMIT_MSG\", \"inline\": false },
                     { \"name\": \"👤 Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true },
                     { \"name\": \"📊 Estado\", \"value\": \"$STATUS\", \"inline\": true }
                   ],
                   \"footer\": { \"text\": \"CI/CD Pipeline — BotFlow Agency\" },
                   \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                 }]
               }" ${{ secrets.DISCORD_WEBHOOK_DEPLOY }}