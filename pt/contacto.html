const ScrollFab = () => {
  const [vis, setVis] = React.useState(false);
  const [atBottom, setAtBottom] = React.useState(false);
  React.useEffect(() => {
    const fn = () => {
      const scrolled = window.scrollY;
      const total = document.documentElement.scrollHeight - window.innerHeight;
      setVis(scrolled > 320);
      setAtBottom(total > 0 && scrolled / total > 0.85);
    };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <button onClick={() => { if(atBottom) window.scrollTo({top:0,behavior:'smooth'}); else window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}); }}
      style={{position:'fixed',right:24,bottom:148,zIndex:198,width:46,height:46,borderRadius:13,border:'1px solid rgba(255,255,255,0.25)',background:'linear-gradient(135deg,#1d4ed8,#7c3aed)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all .25s',opacity:vis?1:0,transform:vis?'scale(1)':'scale(0.8)',pointerEvents:vis?'all':'none',boxShadow:'0 4px 20px rgba(29,78,216,0.45)'}}
      aria-label={atBottom?'Voltar ao topo':'Ir para baixo'}
      onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.1)';e.currentTarget.style.boxShadow='0 6px 28px rgba(29,78,216,0.6)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 4px 20px rgba(29,78,216,0.45)';}}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{transition:'transform .25s',transform:atBottom?'rotate(180deg)':'rotate(0deg)'}}>

      </svg>
    </button>
  );
};
