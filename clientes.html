  React.useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('on'); }),
      { threshold:.1, rootMargin:'0px 0px -40px 0px' }
    );
    document.querySelectorAll('.rev').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
};

const ScrollFab = () => {

  React.useEffect(() => {
    const fn = () => {
      const scrolled = window.scrollY;
      const total = document.documentElement.scrollHeight - window.innerHeight;
      setVis(scrolled > 320);
      setAtBottom(total > 0 && scrolled / total > 0.85);
    };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  const handleClick = () => {
    if (atBottom) { window.scrollTo({ top: 0, behavior: 'smooth' }); }

    <button onClick={handleClick} style={{...base, bottom:148}} aria-label={atBottom ? 'Volver arriba' : 'Ir abajo'} onMouseEnter={e=>{ e.currentTarget.style.background='rgba(26,86,219,0.5)'; e.currentTarget.style.borderColor='rgba(96,165,250,0.4)'; }} onMouseLeave={e=>{ e.currentTarget.style.background='rgba(32,29,46,0.90)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.12)'; }}>
