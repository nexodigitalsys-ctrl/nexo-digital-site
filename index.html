<style>
/* =================================================================== */
:root {
  --bg:#f5f7fb; --surf:#ffffff; --surf2:#eef1f8; --surf3:#e4e9f4;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

a{text-decoration:none;color:inherit;}

/* =================================================================== */
@keyframes fadeUp  {from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn  {from{opacity:0;}to{opacity:1;}}
@keyframes floatA  {0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-32px) scale(1.04);}}
@keyframes floatB  {0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(26px) scale(0.97);}}
@keyframes floatC  {0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-18px) rotate(4deg);}}
@keyframes gridPan {from{background-position:0 0;}to{background-position:52px 52px;}}
@keyframes marquee    {from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes marqueeRev {from{transform:translateX(-50%);}to{transform:translateX(0);}}
@keyframes pulse   {0%,100%{box-shadow:0 0 0 0 rgba(26,86,219,0.3);}50%{box-shadow:0 0 0 12px rgba(26,86,219,0);}}
@keyframes slideUp {from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes ticker  {from{transform:translateX(0);}to{transform:translateX(-50%);}}
@keyframes tickerR {from{transform:translateX(-50%);}to{transform:translateX(0);}}
@keyframes auroraShift{0%{opacity:.7;background-position:0% 50%;}50%{opacity:1;background-position:100% 50%;}100%{opacity:.7;background-position:0% 50%;}}
@keyframes gradShift{0%,100%{background-position:0% 50%;}50%{background-position:100% 50%;}}

.client-wrap{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;}
.cpill{border-radius:9999px;border:1px solid var(--bdr);background:#ffffff;padding:9px 18px;font-size:12.5px;font-weight:600;color:var(--txt-s);transition:all .2s;}
.cpill:hover{border-color:rgba(29,78,216,0.25);color:var(--txt);background:#eef1f8;}
.cta-join{margin-top:28px;border-radius:18px;border:1px dashed rgba(29,78,216,0.2);background:rgba(29,78,216,0.04);padding:28px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}

/* =================================================================== */
.fbox{max-width:640px;margin:0 auto;border-radius:24px;border:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:clamp(28px,4vw,48px);box-shadow:0 4px 8px rgba(0,0,0,0.03),0 20px 60px rgba(29,78,216,0.1);}
.fl2{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;color:var(--txt-m);margin-bottom:7px;}
.fi2,.fs2,.ft2{width:100%;padding:12px 15px;border-radius:10px;border:1px solid rgba(0,0,0,0.1);background:#f5f7fb;color:var(--txt);font-family:var(--sans);font-size:14.5px;transition:border-color .2s,box-shadow .2s;outline:none;color-scheme:light;}
.fi2:focus,.fs2:focus,.ft2:focus{border-color:rgba(29,78,216,0.45);box-shadow:0 0 0 3px rgba(29,78,216,0.08);background:#ffffff;}
.fs2 option,.fs2 optgroup{background:#ffffff;color:#0f172a;}
.ft2{min-height:96px;resize:vertical;}
.fg2{margin-bottom:16px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:540px){.fr2{grid-template-columns:1fr;}}
/* =================================================================== */
#contacto .fl2{color:rgba(255,255,255,0.55);}
#contacto .fi2,#contacto .fs2,#contacto .ft2{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#ffffff;color-scheme:dark;}
#contacto .fi2::placeholder,#contacto .ft2::placeholder{color:rgba(255,255,255,0.3);}
#contacto .fi2:focus,#contacto .fs2:focus,#contacto .ft2:focus{border-color:rgba(99,102,241,0.6);box-shadow:0 0 0 3px rgba(99,102,241,0.15);background:rgba(255,255,255,0.1);}
#contacto .fs2 option,#contacto .fs2 optgroup{background:#1e1b4b;color:#e2e8f0;}

.fmsg{display:none;padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;}
.fmsg.ok{display:block;background:rgba(5,150,105,0.2);border:1px solid rgba(52,211,153,0.4);color:#6ee7b7;}
.fmsg.err{display:block;background:rgba(239,68,68,0.09);border:1px solid rgba(239,68,68,0.27);color:#fca5a5;}

/* =================================================================== */
.sticky-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);pointer-events:none;}
.sticky-bar.show{transform:translateY(0);pointer-events:all;}
.sticky-inner{background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,0.09);padding:14px 24px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}
.sticky-txt{font-size:14px;color:var(--txt-s);}
.sticky-txt strong{color:var(--txt);}
.sticky-x{background:none;border:none;color:var(--txt-m);cursor:pointer;font-size:18px;padding:4px 8px;transition:color .2s;}
.sticky-x:hover{color:var(--txt);}

/* =================================================================== */
.wa-fab{position:fixed;bottom:80px;right:24px;z-index:199;width:54px;height:54px;border-radius:50%;background:#25D366;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(37,211,102,0.4);transition:transform .2s,box-shadow .2s;}
.wa-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(37,211,102,0.55);}
.wa-fab svg{fill:white;}

/* =================================================================== */
.footer{border-top:1px solid rgba(255,255,255,0.06);background:#0f172a;padding:clamp(56px,9vw,80px) 0 32px;--txt:#e2e8f0;--txt-s:#94a3b8;--txt-m:#64748b;--bdr:rgba(255,255,255,0.08);--bdr-s:rgba(255,255,255,0.14);}
.fg3{display:grid;grid-template-columns:1.4fr repeat(3,minmax(0,1fr));gap:clamp(24px,4vw,40px);margin-bottom:32px;}
@media(max-width:768px){.fg3{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.fg3{grid-template-columns:1fr;}}
.fh{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.2em;color:#93c5fd;margin-bottom:15px;}
.flk{display:block;font-size:13.5px;color:var(--txt-s);margin-bottom:9px;transition:color .2s;}
.flk:hover{color:var(--txt);}
.fbot{border-top:1px solid rgba(255,255,255,0.07);padding-top:18px;font-size:12px;color:#64748b;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}

/* =================================================================== */
.proc-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.proc-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--txt-m);margin-bottom:4px;}

/* =================================================================== */
.test-stars{display:flex;gap:2px;margin-bottom:14px;}
.test-star{color:#f59e0b;font-size:14px;line-height:1;}
.test-q{font-size:13.5px;line-height:1.9;color:var(--txt-s);flex-grow:1;margin-bottom:18px;}
.test-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}

/* =================================================================== */
hr{border:none;border-top:1px solid var(--bdr);}
</style>
</head>
<body id="top">
<div id="root" style="position:relative;z-index:1;"></div>
